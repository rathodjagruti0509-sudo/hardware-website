<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Express | Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login">
    <header class="site-header">
    <div class="container header-wrap">
      <a class="brand" href="index.html">FoodExpress</a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle" />
      <label for="nav-toggle" class="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <nav class="main-nav">
        <ul>
          <li><a class="nav-home" href="index.html">Home</a></li>
          <li><a class="nav-login" href="login.html">Login</a></li>
          <li><a class="nav-register" href="register.html">Register</a></li>
          <li><a class="nav-menu" href="menu.html">Menu</a></li>
          <li><a class="nav-offers" href="offers.html">Offers</a></li>
          <li><a class="nav-about" href="about.html">About</a></li>
          <li><a class="nav-contact" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="form-wrap">
      <h2>Welcome Back</h2>
      <p>Login to continue ordering your favorite food.</p>
      <form action="menu.html">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" required />
        </div>
        <button class="btn btn-primary full" type="submit">Login</button>
      </form>
      <p class="form-note">Don't have an account? <a href="register.html">Register</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>FoodExpress - Secure and smooth ordering experience.</p>
  </footer>
</body>
</html>
